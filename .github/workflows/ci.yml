name: CI

# Cancel duplicate jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      cln-version:
        required: true
        type: string
      pyln-version:
        required: true
        type: string
      node-version:
        required: true
        type: string
      tagged-release:
        required: true
        type: boolean

jobs:
  build:
    name: Test CLN=${{ inputs.cln-version }}, OS=${{ matrix.os }}, NODE=${{ matrix.node-version }}, PY=${{ matrix.python-version }}, BTC=${{ matrix.bitcoind-version }}
    strategy:
      fail-fast: false
      matrix:
        bitcoind-version: ["26.1"]
        python-version: ["3.8", "3.12"]
        node-version: ["18", "20"]
        os: ["ubuntu-latest"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create cache paths
        run: |
          sudo mkdir -p /usr/local/libexec/c-lightning
          sudo mkdir -p /usr/local/libexec/c-lightning/plugins
          sudo chown -R $USER /usr/local/libexec

      - name: Cache CLN
        id: cache-cln
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/lightning*
            /usr/local/libexec/c-lightning
          key: cache-cln-${{ inputs.cln-version }}-${{ runner.os }}

      - name: Cache bitcoind
        id: cache-bitcoind
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/bitcoin*
          key: cache-bitcoind-${{ matrix.bitcoind-version }}-${{ runner.os }}

      - name: Download Bitcoin ${{ matrix.bitcoind-version }} & install binaries
        if: ${{ steps.cache-bitcoind.outputs.cache-hit != 'true' }}
        run: |
          export BITCOIND_VERSION=${{ matrix.bitcoind-version }}
          if [[ "${{ matrix.os }}" =~ "ubuntu" ]]; then
            export TARGET_ARCH="x86_64-linux-gnu"
          fi
          if [[ "${{ matrix.os }}" =~ "macos" ]]; then
            export TARGET_ARCH="x86_64-apple-darwin"
          fi
          wget https://bitcoincore.org/bin/bitcoin-core-${BITCOIND_VERSION}/bitcoin-${BITCOIND_VERSION}-${TARGET_ARCH}.tar.gz
          tar -xzf bitcoin-${BITCOIND_VERSION}-${TARGET_ARCH}.tar.gz
          sudo mv bitcoin-${BITCOIND_VERSION}/bin/* /usr/local/bin
          rm -rf bitcoin-${BITCOIND_VERSION}-${TARGET_ARCH}.tar.gz bitcoin-${BITCOIND_VERSION}

      - name: Download Core Lightning ${{ inputs.cln-version }} & install binaries
        if: ${{ contains(matrix.os, 'ubuntu') && steps.cache-cln.outputs.cache-hit != 'true' }}
        run: |
          url=$(curl -s https://api.github.com/repos/ElementsProject/lightning/releases/tags/${{ inputs.cln-version }} \
          | jq '.assets[] | select(.name | contains("22.04")) | .browser_download_url' \
          | tr -d '\"')
          wget $url
          sudo tar -xvf ${url##*/} -C /usr/local --strip-components=2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Checkout Core Lightning ${{ inputs.cln-version }}
        if: ${{ contains(matrix.os, 'macos') && steps.cache-cln.outputs.cache-hit != 'true' }}
        uses: actions/checkout@v4
        with:
          repository: "ElementsProject/lightning"
          path: "lightning"
          ref: ${{ inputs.cln-version }}
          submodules: "recursive"

      - name: Install Python and System dependencies
        run: |
          if [[ "${{ matrix.os }}" =~ "macos" ]]; then
            brew install autoconf automake libtool gnu-sed gettext libsodium sqlite
          fi
          python -m venv venv
          source venv/bin/activate
          python -m pip install -U pip
          pip3 install "pyln-proto<=${{ inputs.pyln-version }}" "pyln-client<=${{ inputs.pyln-version }}" "pyln-testing<=${{ inputs.pyln-version }}"
          pip3 install -r requirements.txt

      - name: Compile Core Lightning ${{ inputs.cln-version }} & install binaries
        if: ${{ contains(matrix.os, 'macos') && steps.cache-cln.outputs.cache-hit != 'true' }}
        run: |
          export EXPERIMENTAL_FEATURES=1
          export COMPAT=0
          export VALGRIND=0
          source venv/bin/activate
          cd lightning
          ./configure --disable-valgrind
          make
          sudo make install

      - name: Install Node dependencies
        run: |
          cd tests
          npm install

      - name: Run Python unit tests
        run: |
          source venv/bin/activate
          cd tests
          pytest test_nwc_units.py -v --tb=short

      - name: Start mock relay
        run: |
          chmod +x contrib/start_mock_relay.sh
          export VENV_PATH=${{ github.workspace }}/venv
          bash contrib/start_mock_relay.sh

      - name: Setup regtest environment
        run: |
          chmod +x contrib/ci_setup_regtest.sh contrib/plugin_wrapper.sh
          export BITCOIN_DIR=$HOME/.bitcoin-regtest
          export LIGHTNING_DIR=${{ github.workspace }}/tests/.lightning_nodes
          export VENV_PATH=${{ github.workspace }}/venv
          export TEST_RELAY=1
          export PYTHONUNBUFFERED=1
          bash contrib/ci_setup_regtest.sh

      - name: Run integration tests
        run: |
          # Tail relay logs in background so we can see what's happening
          if [ -f /tmp/mock_relay.log ]; then
            tail -f /tmp/mock_relay.log &
            TAIL_PID=$!
            echo "Tailing relay logs (PID: $TAIL_PID)"
          fi

          export CLN_PATH=${{ github.workspace }}/lightning
          export SLOW_MACHINE=1
          export TEST_DEBUG=1
          export PYTEST_TIMEOUT=600
          export TEST_RELAY=1
          export PYTHONUNBUFFERED=1
          source venv/bin/activate
          cd tests

          # Run tests and capture exit code
          npm test
          TEST_EXIT=$?

          # Stop tailing logs
          if [ -n "$TAIL_PID" ]; then
            kill $TAIL_PID 2>/dev/null || true
          fi

          exit $TEST_EXIT

      - name: Cleanup regtest environment
        if: always()
        run: |
          chmod +x contrib/ci_cleanup_regtest.sh contrib/stop_mock_relay.sh
          export BITCOIN_DIR=$HOME/.bitcoin-regtest
          export LIGHTNING_DIR=${{ github.workspace }}/tests/.lightning_nodes
          bash contrib/ci_cleanup_regtest.sh
          bash contrib/stop_mock_relay.sh
