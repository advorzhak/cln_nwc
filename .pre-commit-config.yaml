# Pre-commit hooks configuration
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Python formatting with black
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=88]

  # Python import sorting with isort
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.0
    hooks:
      - id: isort
        args: [--profile=black]

  # Python linting with flake8
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args:
          - --max-line-length=88
          - --extend-ignore=E203,W503
        additional_dependencies: [flake8-bugbear]

  # Python security checking with bandit (optional - skipped due to pbr dependency)
  # Uncomment to enable if pbr is available
  # - repo: https://github.com/PyCQA/bandit
  #   rev: 1.7.4
  #   hooks:
  #     - id: bandit
  #       args: [--severity-level=medium, --skip=B101]

  # JavaScript/YAML formatting with prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.3
    hooks:
      - id: prettier
        types_or:
          - javascript
          - yaml
          - json
          - markdown
        args: [--write]

  # Nix formatting
  - repo: https://github.com/nix-community/nixpkgs-fmt
    rev: v1.3.0
    hooks:
      - id: nixpkgs-fmt

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--config-file, .yamllint]

  # Markdown linting (optional - very strict)
  # - repo: https://github.com/igorshubovych/markdownlint-cli
  #   rev: v0.35.0
  #   hooks:
  #     - id: markdownlint
  #       args: [--fix]

  # Generic checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Trailing whitespace
      - id: trailing-whitespace
        exclude: ^(contrib/|flake.)

      # End of file fixer
      - id: end-of-file-fixer

      # Check for added large files
      - id: check-added-large-files
        args: [--maxkb=1000]

      # Validate JSON
      - id: check-json

      # Validate YAML
      - id: check-yaml
        args: [--unsafe]

      # Check for merge conflicts
      - id: check-merge-conflict

      # Detect private keys
      - id: detect-private-key

      # Check case conflicts in filenames
      - id: check-case-conflict

      # Fix mixed line endings
      - id: mixed-line-ending
        args: [--fix=lf]

ci:
  autoupdate_interval: weekly
  skip: [markdownlint] # Skip slow hooks in CI
